services:
  - type: web
    name: concert-matcher
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --timeout 180 app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: MAX_UPLOAD_MB
        value: "80"
      - key: AI_MATCH_ENABLED
        value: "false"
