services:
  - type: web
    name: concert-matcher
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --worker-class gthread --threads 2 --workers 1 --timeout 1800 app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: WEB_CONCURRENCY
        value: "1"
      - key: MAX_UPLOAD_MB
        value: "30"
      - key: MAX_IMAGE_FILE_MB
        value: "12"
      - key: MAX_IMAGE_PIXELS
        value: "12000000"
      - key: MAX_IMAGE_DIMENSION
        value: "12000"
      - key: JOB_TTL_SECONDS
        value: "86400"
      - key: OUTPUT_ROOT
        value: outputs/webapp
      - key: OCR_MAX_WORKERS
        value: "1"
      - key: XHS_MAX_WORKERS
        value: "2"
      - key: NETEASE_MAX_WORKERS
        value: "2"
      - key: PIPELINE_PARALLEL_LOAD
        value: "false"
      - key: AI_MATCH_ENABLED
        value: "true"
      - key: AI_MATCH_BASE_URL
        value: https://open.bigmodel.cn/api/paas/v4
      - key: AI_MATCH_MODEL
        value: GLM-4-Flash
      - key: AI_MATCH_MODE
        value: ai_only
      - key: AI_MATCH_TIMEOUT_SECONDS
        value: "60"
      - key: AI_MATCH_CANDIDATE_LIMIT
        value: "200"
      - key: AI_MATCH_EVENT_BATCH_SIZE
        value: "40"
      - key: AI_MATCH_EVENT_WORKERS
        value: "2"
      - key: AI_MATCH_MAX_CALLS
        value: "20"
      - key: AI_MATCH_MAX_ELAPSED_SECONDS
        value: "600"
      - key: AI_OCR_ENABLED
        value: "true"
      - key: AI_OCR_PROVIDER_1_NAME
        value: siliconflow
      - key: AI_OCR_PROVIDER_1_ENABLED
        value: "true"
      - key: AI_OCR_PROVIDER_1_BASE_URL
        value: https://api.siliconflow.cn/v1
      - key: AI_OCR_PROVIDER_1_MODEL
        value: Qwen/Qwen3-VL-32B-Instruct
      - key: AI_OCR_PROVIDER_2_NAME
        value: zhipu
      - key: AI_OCR_PROVIDER_2_ENABLED
        value: "true"
      - key: AI_OCR_PROVIDER_2_BASE_URL
        value: https://open.bigmodel.cn/api/paas/v4
      - key: AI_OCR_PROVIDER_2_MODEL
        value: glm-4.6v
      - key: AI_OCR_IMAGE_BATCH_SIZE
        value: "1"
      - key: AI_OCR_IMAGE_WORKERS
        value: "3"
      - key: AI_OCR_IMAGE_DETAIL
        value: auto
      - key: AI_OCR_MAX_WIDTH
        value: "1200"
      - key: AI_OCR_DUAL_PROVIDER
        value: "true"
      - key: AI_OCR_PROVIDER_FALLBACK
        value: "true"
      - key: AI_OCR_TIMEOUT_SECONDS
        value: "90"
      - key: AI_OCR_LOCAL_FALLBACK
        value: "false"
      - key: AI_OCR_PROVIDER_1_API_KEY
        sync: false
      - key: AI_OCR_PROVIDER_2_API_KEY
        sync: false
      - key: AI_MATCH_API_KEY
        sync: false
